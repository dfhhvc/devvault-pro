<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="sidebar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bg)"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="260" height="700" fill="url(#sidebar)" stroke="#334155" stroke-width="1"/>

  <!-- Logo -->
  <text x="30" y="40" fill="#60a5fa" font-family="system-ui" font-size="20" font-weight="bold">🔒 DevVault Pro</text>

  <!-- Sidebar Items -->
  <text x="30" y="90" fill="#94a3b8" font-family="system-ui" font-size="12">📁 JSON 工具</text>
  <rect x="20" y="100" width="220" height="32" rx="6" fill="#3b82f6" opacity="0.2"/>
  <text x="40" y="121" fill="#60a5fa" font-family="system-ui" font-size="13">JSON 格式化</text>
  <text x="40" y="155" fill="#94a3b8" font-family="system-ui" font-size="13">JSON 验证</text>
  <text x="40" y="185" fill="#94a3b8" font-family="system-ui" font-size="13">JSON ↔ YAML</text>

  <text x="30" y="230" fill="#94a3b8" font-family="system-ui" font-size="12">🔐 编码解码</text>
  <text x="40" y="255" fill="#94a3b8" font-family="system-ui" font-size="13">Base64</text>
  <text x="40" y="280" fill="#94a3b8" font-family="system-ui" font-size="13">URL 编码</text>

  <text x="30" y="320" fill="#94a3b8" font-family="system-ui" font-size="12">🎫 JWT 调试</text>
  <text x="30" y="360" fill="#94a3b8" font-family="system-ui" font-size="12">🎯 正则测试</text>
  <text x="30" y="400" fill="#94a3b8" font-family="system-ui" font-size="12">#️⃣ 哈希与生成</text>
  <text x="30" y="440" fill="#94a3b8" font-family="system-ui" font-size="12">⏰ 时间工具</text>

  <!-- Header -->
  <rect x="260" y="0" width="940" height="56" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="290" y="35" fill="#f1f5f9" font-family="system-ui" font-size="16" font-weight="600">DevVault Pro</text>
  <text x="420" y="35" fill="#64748b" font-family="system-ui" font-size="14">/ JSON 格式化</text>

  <!-- Badge -->
  <rect x="1020" y="16" width="120" height="24" rx="12" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="1"/>
  <text x="1080" y="32" fill="#22c55e" font-family="system-ui" font-size="11" text-anchor="middle">✓ 100% 本地运行</text>

  <!-- Main Content -->
  <rect x="280" y="76" width="900" height="600" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- Tabs -->
  <rect x="300" y="90" width="80" height="32" rx="6" fill="#3b82f6" opacity="0.2"/>
  <text x="340" y="111" fill="#60a5fa" font-family="system-ui" font-size="13" text-anchor="middle">格式化</text>
  <text x="420" y="111" fill="#64748b" font-family="system-ui" font-size="13">压缩</text>
  <text x="480" y="111" fill="#64748b" font-family="system-ui" font-size="13">转义</text>
  <text x="540" y="111" fill="#64748b" font-family="system-ui" font-size="13">去转义</text>

  <!-- Input Area -->
  <text x="300" y="150" fill="#94a3b8" font-family="system-ui" font-size="12">输入</text>
  <rect x="300" y="160" width="420" height="200" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="320" y="185" fill="#64748b" font-family="monospace" font-size="13">{"name":"DevVault",</text>
  <text x="320" y="205" fill="#64748b" font-family="monospace" font-size="13"> "version":"1.0.0",</text>
  <text x="320" y="225" fill="#64748b" font-family="monospace" font-size="13"> "tools":15}</text>

  <!-- Output Area -->
  <text x="740" y="150" fill="#94a3b8" font-family="system-ui" font-size="12">输出</text>
  <rect x="740" y="160" width="420" height="200" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="760" y="185" fill="#22c55e" font-family="monospace" font-size="13">{</text>
  <text x="780" y="205" fill="#f1f5f9" font-family="monospace" font-size="13">"name": "DevVault",</text>
  <text x="780" y="225" fill="#f1f5f9" font-family="monospace" font-size="13">"version": "1.0.0",</text>
  <text x="780" y="245" fill="#f1f5f9" font-family="monospace" font-size="13">"tools": 15</text>
  <text x="760" y="265" fill="#22c55e" font-family="monospace" font-size="13">}</text>

  <!-- Button -->
  <rect x="1060" y="380" width="100" height="36" rx="6" fill="#3b82f6"/>
  <text x="1110" y="403" fill="#ffffff" font-family="system-ui" font-size="13" text-anchor="middle">处理</text>

  <!-- Features List -->
  <text x="300" y="440" fill="#94a3b8" font-family="system-ui" font-size="12">功能特点</text>
  <rect x="300" y="455" width="860" height="200" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>

  <text x="320" y="485" fill="#22c55e" font-family="system-ui" font-size="13">✓ 100% 前端实现，零数据上传</text>
  <text x="320" y="510" fill="#22c55e" font-family="system-ui" font-size="13">✓ PWA 支持，可完全离线使用</text>
  <text x="320" y="535" fill="#22c55e" font-family="system-ui" font-size="13">✓ 密码学安全随机数生成</text>
  <text x="320" y="560" fill="#22c55e" font-family="system-ui" font-size="13">✓ 44 个单元测试全部通过</text>
  <text x="320" y="585" fill="#22c55e" font-family="system-ui" font-size="13">✓ 深色/浅色主题切换</text>
  <text x="320" y="610" fill="#22c55e" font-family="system-ui" font-size="13">✓ 键盘快捷键支持</text>

  <!-- Footer -->
  <text x="600" y="680" fill="#475569" font-family="system-ui" font-size="11" text-anchor="middle">🔒 你的数据，你做主 — DevVault Pro v1.0.0</text>
</svg>
