<svg xmlns="http://www.w3.org/2000/svg" width="400" height="700" viewBox="0 0 400 700">
  <defs>
    <linearGradient id="bg-mobile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="700" fill="url(#bg-mobile)"/>

  <!-- Header -->
  <rect x="0" y="0" width="400" height="56" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="20" y="35" fill="#f1f5f9" font-family="system-ui" font-size="16" font-weight="600">☰ DevVault Pro</text>

  <!-- Badge -->
  <rect x="280" y="16" width="100" height="24" rx="12" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="1"/>
  <text x="330" y="32" fill="#22c55e" font-family="system-ui" font-size="10" text-anchor="middle">✓ 本地运行</text>

  <!-- Tool Title -->
  <text x="20" y="80" fill="#f1f5f9" font-family="system-ui" font-size="18" font-weight="600">JSON 格式化</text>
  <text x="20" y="100" fill="#64748b" font-family="system-ui" font-size="12">格式化、压缩、转义、去转义 JSON</text>

  <!-- Tabs -->
  <rect x="20" y="120" width="80" height="28" rx="6" fill="#3b82f6" opacity="0.2"/>
  <text x="60" y="138" fill="#60a5fa" font-family="system-ui" font-size="12" text-anchor="middle">格式化</text>
  <text x="120" y="138" fill="#64748b" font-family="system-ui" font-size="12">压缩</text>
  <text x="170" y="138" fill="#64748b" font-family="system-ui" font-size="12">转义</text>

  <!-- Input -->
  <text x="20" y="175" fill="#94a3b8" font-family="system-ui" font-size="11">输入</text>
  <rect x="20" y="185" width="360" height="120" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="35" y="210" fill="#64748b" font-family="monospace" font-size="12">{"name":"DevVault",</text>
  <text x="35" y="230" fill="#64748b" font-family="monospace" font-size="12"> "tools":15}</text>

  <!-- Output -->
  <text x="20" y="330" fill="#94a3b8" font-family="system-ui" font-size="11">输出</text>
  <rect x="20" y="340" width="360" height="120" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="35" y="365" fill="#22c55e" font-family="monospace" font-size="12">{</text>
  <text x="55" y="385" fill="#f1f5f9" font-family="monospace" font-size="12">"name": "DevVault",</text>
  <text x="55" y="405" fill="#f1f5f9" font-family="monospace" font-size="12">"tools": 15</text>
  <text x="35" y="425" fill="#22c55e" font-family="monospace" font-size="12">}</text>

  <!-- Button -->
  <rect x="280" y="480" width="100" height="36" rx="6" fill="#3b82f6"/>
  <text x="330" y="503" fill="#ffffff" font-family="system-ui" font-size="13" text-anchor="middle">处理</text>

  <!-- Features -->
  <text x="20" y="545" fill="#94a3b8" font-family="system-ui" font-size="11">功能特点</text>
  <rect x="20" y="555" width="360" height="120" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="35" y="580" fill="#22c55e" font-family="system-ui" font-size="12">✓ 100% 离线可用</text>
  <text x="35" y="605" fill="#22c55e" font-family="system-ui" font-size="12">✓ 零数据上传</text>
  <text x="35" y="630" fill="#22c55e" font-family="system-ui" font-size="12">✓ 44 个测试通过</text>

  <!-- Footer -->
  <text x="200" y="690" fill="#475569" font-family="system-ui" font-size="10" text-anchor="middle">🔒 DevVault Pro v1.0.0</text>
</svg>
